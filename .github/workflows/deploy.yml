name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROD_FLAG=${{ github.event.inputs.environment == 'production' && '--prod' || '' }}
          npx -y vercel pull --yes --environment=${{ github.event.inputs.environment }} --token="$VERCEL_TOKEN"
          npx -y vercel build $PROD_FLAG --token="$VERCEL_TOKEN"
          npx -y vercel deploy --prebuilt $PROD_FLAG --token="$VERCEL_TOKEN"
