name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROD_FLAG=${{ github.event.inputs.environment == 'production' && '--prod' || '' }}
          bunx -y vercel pull --yes --environment=${{ github.event.inputs.environment }} --token="$VERCEL_TOKEN"
          bunx -y vercel build $PROD_FLAG --token="$VERCEL_TOKEN"
          bunx -y vercel deploy --prebuilt $PROD_FLAG --token="$VERCEL_TOKEN"
